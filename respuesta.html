<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wiiii ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#ff758c,#ff7eb3);

overflow:hidden;
padding:20px;

}

/* tarjeta */

.card{

background:white;

padding:50px 40px;

border-radius:25px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.2);

max-width:420px;
width:100%;

animation:entrada 1s ease;

z-index:10;

}

/* animación */

@keyframes entrada{

from{
transform:scale(.7);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

h1{

font-size:40px;
color:#ff4d6d;

margin-bottom:10px;

}

p{

font-size:22px;
margin-bottom:10px;

}

/* mensaje */

.mensaje{

margin-top:30px;

font-size:18px;

color:#444;

}

/* boton whatsapp */

.boton{

margin-top:18px;

display:inline-block;

padding:14px 26px;

background:#25D366;

color:white;

border-radius:12px;

text-decoration:none;

font-size:18px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

transition:.3s;

}

.boton:hover{

transform:scale(1.08);

}

/* corazones */

.heart{

position:absolute;

bottom:-40px;

font-size:22px;

color:white;

animation:flotar linear infinite;

}

@keyframes flotar{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="card">

<h1>Wiiii 😍</h1>

<p>Sí mi amorcitooo ❤️</p>

<p>Mañana encebolladito juntos 💕</p>

<div class="mensaje">
Escríbeme en el chat a qué hora pasas por mi jejej 😍😍
</div>

<a class="boton"
href="https://wa.me/593967895701?text=Hola%20amor%20%F0%9F%98%8D%20%C2%BFa%20qu%C3%A9%20hora%20pasas%20por%20m%C3%AD%20para%20el%20encebollado%3F"
target="_blank">

Escribirme por WhatsApp 💬

</a>

</div>

<script>

/* corazones flotando */

function crearCorazon(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*15+15)+"px";

heart.style.animationDuration=(Math.random()*4+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

setInterval(crearCorazon,350);

</script>

</body>
</html>
